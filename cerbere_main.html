
<div class="cerbere-main">
  <header class="sheet-header">
    <h1>Fiche de Personnage</h1>
  </header>
  <section class="dice-section">
    <h2>Jets de dés</h2>
    <div class="dice-buttons">
      <button type="roll" value="Jet 1d10 : [[1d10cs&gt;8]]"></button>
      <button type="roll" value="Jet 2d10 : [[1d10cs&gt;8]] [[1d10cs&gt;8]]"></button>
      <button type="roll" value="Jet 3d10 : [[1d10cs&gt;8]] [[1d10cs&gt;8]] [[1d10cs&gt;8]]"></button>
    </div>
  </section>
  <section class="description-section">
    <h2>Description du personnage</h2>
    <input class="edit-toggle" type="checkbox" name="attr_editmode" id="editmode-toggle" hidden="hidden"/>
    <label class="toggle-edit" for="editmode-toggle">Mode édition</label>
    <div class="view-mode">
      <p><strong>Nom</strong><span name="attr_nom"></span></p>
      <p><strong>Description</strong><span name="attr_description"></span></p>
      <p><strong>PV</strong><span name="attr_pv" title="Points de Vie"></span>
      </p>
      <p><strong>PC</strong><span name="attr_pc" title="Points de Confiance"></span>
      </p>
      <p><strong>PR</strong><span name="attr_pr" title="Ressources"></span>
      </p>
      <p><strong>XP</strong><span name="attr_xp" title="Points d’expérience"></span>
      </p>
      <div class="blessures-display"><strong>Blessures</strong>
        <input type="checkbox" name="attr_blessure1"/>
        <input type="checkbox" name="attr_blessure2"/>
        <input type="checkbox" name="attr_blessure3"/>
      </div>
      <p><strong>Invalide</strong>
        <input type="checkbox" name="attr_invalide"/>
      </p>
      <div class="competences-view">
        <h3>Compétences</h3>
        <fieldset class="repeating_competences">
          <div class="competence-item"><span name="attr_nom_competence"></span></div><span name="attr_desc_competence"></span>
        </fieldset>
      </div>
      <h3>Talents</h3><span name="attr_talents"></span>
      <h3>Équipement</h3><span name="attr_equipements"></span>
    </div>
    <div class="edit-mode">
      <label>Nom
        <input type="text" name="attr_nom"/>
      </label>
      <label>Description
        <textarea name="attr_description"></textarea>
      </label>
      <label>Points de Vie
        <input type="number" name="attr_pv"/>
      </label>
      <label>Points de Vie max
        <input type="number" name="attr_pv_max"/>
      </label>
      <label>Points de Confiance
        <input type="number" name="attr_pc"/>
      </label>
      <label>Ressources
        <input type="number" name="attr_pr"/>
      </label>
      <label>Points d’expérience
        <input type="number" name="attr_xp"/>
      </label>
      <label>Compétences :</label>
      <fieldset class="repeating_competences">
        <label>Nom de la compétence :
          <input type="text" name="attr_nom_competence" value=""/>
        </label>
        <label>Description :
          <textarea name="attr_desc_competence"></textarea>
        </label>
      </fieldset>
      <label>Talents :
        <textarea name="attr_talents"></textarea>
      </label>
      <label>Équipement :
        <textarea name="attr_equipements"></textarea>
      </label>
    </div>
  </section>
</div>
