
<div class="cerbere-main">
  <header class="sheet-header">
    <h1>Cerbère</h1>
  </header>
  <section class="dice-section">
    <h2>Jets de dés</h2>
    <div class="dice-buttons">
      <button class="dice-btn" type="roll" value="Jet 1d10 : [[1d10cs&gt;8]]"><span class="dice-icon">J</span></button>
      <button class="dice-btn" type="roll" value="Jet 2d10 : [[1d10cs&gt;8]] [[1d10cs&gt;8]]"><span class="dice-icon">J</span><span class="dice-icon">J</span></button>
      <button class="dice-btn" type="roll" value="Jet 3d10 : [[1d10cs&gt;8]] [[1d10cs&gt;8]] [[1d10cs&gt;8]]"><span class="dice-icon">J</span><span class="dice-icon">J</span><span class="dice-icon">J</span></button>
    </div>
  </section>
  <section class="description-section">
    <h2>Description du personnage</h2>
    <input class="edit-toggle" type="checkbox" name="attr_editmode" id="editmode-toggle" hidden="hidden"/>
    <label class="toggle-edit" for="editmode-toggle">Mode édition</label>
    <div class="view-mode">
      <div class="traits-view">
        <p><strong>Nom</strong><span name="attr_nom"></span></p>
        <p><strong>Description</strong><span name="attr_description"></span></p>
      </div>
      <div class="points-view">
        <p class="point-line"><img class="default-icon" src="https://chocolanoar.github.io/cerbere-fiche-roll20/assets/hearts.svg" alt=""/><strong>PV</strong>
          <input type="number" name="attr_hp" title="Points de Vie"/>
        </p>
        <p class="point-line"><img class="default-icon" src="https://chocolanoar.github.io/cerbere-fiche-roll20/assets/hearts.svg" alt=""/><strong>PV max</strong><span name="attr_hp_max"></span>
        </p>
        <p class="point-line"><img class="default-icon" src="https://chocolanoar.github.io/cerbere-fiche-roll20/assets/polar-star.svg" alt=""/><strong>PC</strong>
          <input type="number" name="attr_pc" title="Points de Confiance"/>
        </p>
        <p class="point-line"><img class="default-icon" src="https://chocolanoar.github.io/cerbere-fiche-roll20/assets/two-coins.svg" alt=""/><strong>PR</strong>
          <input type="number" name="attr_pr" title="Ressources"/>
        </p>
        <p class="point-line"><img class="default-icon" src="https://chocolanoar.github.io/cerbere-fiche-roll20/assets/upgrade.svg" alt=""/><strong>XP</strong><span name="attr_xp" title="Points d’expérience"></span>
        </p>
      </div>
      <div class="blessures-display"><strong>Blessures</strong>
        <input type="checkbox" name="attr_blessure1"/>
        <input type="checkbox" name="attr_blessure2"/>
        <input type="checkbox" name="attr_blessure3"/><strong>Invalide</strong>
        <input type="checkbox" name="attr_invalide"/>
      </div>
      <div class="competences-view">
        <h3>Compétences</h3>
        <fieldset class="repeating_competences">
          <div class="competence-item"><span name="attr_competence_name"></span>
          </div>
          <div class="competence-desc"><span name="attr_competence_desc"></span>
          </div>
          <div class="competence-usage"><strong>Utilisations : </strong>
            <input type="number" name="attr_competence_usage"/><strong>max : </strong><span name="attr_competence_usage_max"></span>
          </div>
        </fieldset>
      </div>
      <div class="cultures-view">
        <h3>Cultures</h3>
        <fieldset class="repeating_cultures">
          <div class="culture-item"><span name="attr_culture_name"></span>
          </div>
          <div class="culture-desc"><span name="attr_culture_desc"></span>
          </div>
        </fieldset>
      </div>
      <div class="maitrises-view">
        <h3>Maîtrises</h3>
        <fieldset class="repeating_maitrises">
          <div class="maitrise-item"><span name="attr_maitrise_name"></span>
          </div>
          <div class="maitrise-desc"><span name="attr_maitrise_desc"></span>
          </div>
        </fieldset>
      </div>
      <div class="talents-view">
        <h3>Talents</h3>
        <fieldset class="repeating_talents">
          <div class="talent-item"><span name="attr_talent_name"></span>
          </div>
          <div class="talent-desc"><span name="attr_talent_desc"></span>
          </div>
          <div class="talent-usage"><strong>Utilisations : </strong>
            <input type="number" name="attr_talent_usage"/><strong>max : </strong><span name="attr_talent_usage_max"></span>
          </div>
        </fieldset>
      </div>
      <div class="equipement-view">
        <h3>Équipement</h3>
        <fieldset class="repeating_equipement">
          <div class="equipement-item"><span name="attr_equipement_name"></span>
          </div>
        </fieldset>
        <h4>Les trois trucs</h4>
        <div class="equipement-trucs"><span name="attr_equipement_truc1"></span><span name="attr_equipement_truc2"></span><span name="attr_equipement_truc3"></span>
        </div>
      </div>
    </div>
    <div class="edit-mode">
      <div class="traits-edit">
        <label>Nom
          <input type="text" name="attr_nom"/>
        </label>
        <label>Description
          <textarea name="attr_description"></textarea>
        </label>
      </div>
      <div class="points-edit">
        <label>Points de Vie max</label>
        <input type="number" name="attr_hp_max" value="10"/>
        <label>Points de Confiance</label>
        <input type="number" name="attr_pc" value="2"/>
        <label>Ressources</label>
        <input type="number" name="attr_pr" value="4"/>
        <label>Points d’expérience</label>
        <input type="number" name="attr_xp" value="0"/>
      </div>
      <div class="competences-edit">
        <label>Compétences :</label>
        <fieldset class="repeating_competences">
          <label>Nom de la compétence</label>
          <input type="text" name="attr_competence_name" value=""/>
          <label>Description</label>
          <textarea name="attr_competence_desc"></textarea>
          <label>Nombre d’utilisations</label>
          <input type="number" name="attr_competence_usage_max" value="0"/>
        </fieldset>
      </div>
      <div class="cultures-edit">
        <label>Cultures :</label>
        <fieldset class="repeating_cultures">
          <label>Nom de la culture</label>
          <input type="text" name="attr_culture_name" value=""/>
          <label>Description</label>
          <textarea name="attr_culture_desc"></textarea>
        </fieldset>
      </div>
      <div class="maitrises-edit">
        <label>Maîtrises :</label>
        <fieldset class="repeating_maitrises">
          <label>Nom de la maitrise</label>
          <input type="text" name="attr_maitrise_name" value=""/>
          <label>Description</label>
          <textarea name="attr_maitrise_desc"></textarea>
        </fieldset>
      </div>
      <div class="talents-edit">
        <label>Talents :</label>
        <fieldset class="repeating_talents">
          <label>Nom du talent</label>
          <input type="text" name="attr_talent_name" value=""/>
          <label>Description</label>
          <textarea name="attr_talent_desc"></textarea>
          <label>Nombre d’utilisations</label>
          <input type="number" name="attr_talent_usage_max" value="0"/>
        </fieldset>
      </div>
      <div class="equipement-edit">
        <label>Équipement :</label>
        <fieldset class="repeating_equipement">
          <label>Nom et description</label>
          <input type="text" name="attr_equipement_name" value=""/>
        </fieldset>
        <label>Les trois trucs :</label>
        <input type="text" name="attr_equipement_truc1" value=""/>
        <input type="text" name="attr_equipement_truc2" value=""/>
        <input type="text" name="attr_equipement_truc3" value=""/>
      </div>
    </div>
  </section>
</div>
